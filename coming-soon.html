<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Something amazing is coming soon from PartyPop — Stay tuned for exciting new party themes and services!">
    <title>Coming Soon | PartyPop — Party Supplies & Decoration Store</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='none'%3E%3Ccircle cx='50' cy='50' r='47' stroke='%23E8457C' stroke-width='2' stroke-opacity='0.4' fill='none'/%3E%3Cpath d='M30 70 L45 35 L65 55 Z' fill='%23E8457C' fill-opacity='0.15' stroke='%23E8457C' stroke-width='2'/%3E%3Ccircle cx='55' cy='28' r='4' fill='%23E8457C' opacity='0.8'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:'#E8457C',secondary:'#1E1B2E'}}}}</script>
</head>
<body>
<div class="auth-page" id="coming-soon-page" style="min-height:100vh;">
    <!-- Top-right controls -->
    <div class="auth-top-icons">
        <button class="icon-btn dark-toggle" title="Toggle Dark Mode">
            <i class="fas fa-moon"></i>
        </button>
        <button class="icon-btn rtl-toggle" title="Toggle RTL">
            <i class="fas fa-exchange-alt"></i>
        </button>
    </div>

    <!-- Decorative background -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <div class="absolute w-[600px] h-[600px] rounded-full" style="background:radial-gradient(circle,rgba(232,69,124,0.10) 0%,transparent 70%);top:-200px;left:-200px;"></div>
        <div class="absolute w-[500px] h-[500px] rounded-full" style="background:radial-gradient(circle,rgba(232,69,124,0.06) 0%,transparent 70%);bottom:-150px;right:-150px;"></div>
        <div class="absolute inset-0" style="background-image:linear-gradient(rgba(232,69,124,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(232,69,124,0.02) 1px,transparent 1px);background-size:48px 48px;"></div>

        <!-- Floating party elements -->
        <div class="absolute top-[12%] right-[8%] opacity-25" style="animation:float 5s ease-in-out infinite;">
            <svg width="50" height="50" viewBox="0 0 50 50" fill="none">
                <path d="M25 5 L29 18 L43 18 L32 27 L36 41 L25 32 L14 41 L18 27 L7 18 L21 18 Z" stroke="#E8457C" stroke-width="1.2" fill="rgba(232,69,124,0.06)"/>
            </svg>
        </div>
        <div class="absolute top-[20%] left-[5%] opacity-20" style="animation:float 7s ease-in-out infinite 2s;">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="16" stroke="#F06A99" stroke-width="1.5" stroke-dasharray="5 4" fill="none"/>
            </svg>
        </div>
        <div class="absolute bottom-[15%] left-[10%] opacity-20" style="animation:float 6s ease-in-out infinite 1s;">
            <svg width="35" height="35" viewBox="0 0 35 35" fill="none">
                <rect x="5" y="5" width="25" height="25" rx="5" stroke="#E8457C" stroke-width="1.2" fill="rgba(232,69,124,0.05)" transform="rotate(25 17.5 17.5)"/>
            </svg>
        </div>
        <div class="absolute bottom-[25%] right-[12%] opacity-25" style="animation:float 5.5s ease-in-out infinite 0.5s;">
            <svg width="45" height="45" viewBox="0 0 45 45" fill="none">
                <path d="M15 35 L22 10 L35 28 Z" stroke="#E8457C" stroke-width="1.2" fill="rgba(232,69,124,0.06)" stroke-linejoin="round"/>
                <circle cx="30" cy="8" r="3" fill="#F06A99" opacity="0.5"/>
                <circle cx="38" cy="15" r="2" fill="#E8457C" opacity="0.4"/>
            </svg>
        </div>
    </div>

    <!-- Content -->
    <div class="text-center relative z-10 max-w-xl px-4 animate-on-scroll zoom-in">
        <!-- Logo -->
        <a href="index.html" class="auth-logo mb-8">
            <svg width="36" height="36" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="balloonGradCS" x1="30%" y1="0%" x2="70%" y2="100%">
                        <stop offset="0%" stop-color="#F06A99"/>
                        <stop offset="100%" stop-color="#E8457C"/>
                    </linearGradient>
                </defs>
                <ellipse cx="45" cy="45" rx="22" ry="28" fill="url(#balloonGradCS)" opacity="0.9"/>
                <ellipse cx="38" cy="35" rx="6" ry="10" fill="white" opacity="0.25" transform="rotate(-15 38 35)"/>
                <path d="M43 72 L45 75 L47 72" stroke="#C22E60" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <path d="M45 75 Q42 85 48 95" stroke="#C22E60" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
                <circle cx="72" cy="22" r="4" fill="#E8457C"/>
                <circle cx="78" cy="38" r="3" fill="#F06A99" opacity="0.8"/>
                <circle cx="65" cy="15" r="3" fill="#F9A8C9" opacity="0.9"/>
                <path d="M80 18 L82 14 L84 18 L88 20 L84 22 L82 26 L80 22 L76 20 Z" fill="#F9A8C9" opacity="0.8"/>
                <path d="M68 8 L69 5 L70 8 L73 9 L70 10 L69 13 L68 10 L65 9 Z" fill="#E8457C" opacity="0.6"/>
            </svg>
            <span style="font-family:'Playfair Display',serif;">PartyPop</span>
        </a>

        <!-- Sparkle icon -->
        <div class="w-20 h-20 rounded-full bg-gradient-to-br from-[#E8457C] to-[#C22E60] flex items-center justify-center mx-auto mb-8 shadow-lg shadow-[#E8457C]/30">
            <i class="fas fa-wand-magic-sparkles text-3xl text-white"></i>
        </div>

        <h1 class="text-4xl sm:text-5xl font-bold mb-4" style="font-family:'Playfair Display',serif;">
            Something <span class="gradient-text">Amazing</span> is Coming!
        </h1>
        <p class="text-neutral-500 dark:text-neutral-400 text-lg mb-10 leading-relaxed">
            We're cooking up exciting new party themes, exclusive collections, and magical celebration experiences. Stay tuned!
        </p>

        <!-- Countdown -->
        <div class="flex justify-center gap-2 sm:gap-6 mb-12">
            <div class="countdown-box">
                <span class="number" id="countdown-days">30</span>
                <span class="label">Days</span>
            </div>
            <div class="countdown-box">
                <span class="number" id="countdown-hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="countdown-box">
                <span class="number" id="countdown-mins">00</span>
                <span class="label">Mins</span>
            </div>
            <div class="countdown-box">
                <span class="number" id="countdown-secs">00</span>
                <span class="label">Secs</span>
            </div>
        </div>

        <!-- Email subscription -->
        <div class="max-w-md mx-auto">
            <p class="text-sm font-semibold text-neutral-600 dark:text-neutral-300 mb-4">Get notified when we launch</p>
            <form class="flex flex-col sm:flex-row gap-3" onsubmit="event.preventDefault(); this.querySelector('button').innerHTML='<i class=\'fas fa-check\'></i> Subscribed!'; this.querySelector('input').value='';">
                <input type="email" required placeholder="your@email.com" class="flex-1 px-5 py-3.5 rounded-full border border-[#F0E4D8] dark:border-[#2D2950] bg-white dark:bg-[#1C1930] text-sm focus:border-[#E8457C] focus:ring-2 focus:ring-[#E8457C]/20 outline-none transition-all dark:text-white">
                <button type="submit" class="btn btn-primary btn-shine whitespace-nowrap">
                    <i class="fas fa-bell text-sm"></i> Notify Me
                </button>
            </form>
        </div>

        <!-- Back home link -->
        <div class="mt-10">
            <a href="index.html" class="text-sm text-[#E8457C] font-semibold hover:underline">
                <i class="fas fa-arrow-left text-xs mr-1"></i> Back to Home
            </a>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
